    const { useState, useMemo, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

    // Firebase sync hook
    // Firebase keys can't contain . # $ [ ] /
    // So we encode/decode keys with / -> |
    function encodeKeys(obj) {
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
      const out = {};
      Object.entries(obj).forEach(([k, v]) => {
        const safeKey = k.replace(/\//g, "|");
        out[safeKey] = encodeKeys(v);
      });
      return out;
    }
    function decodeKeys(obj) {
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
      const out = {};
      Object.entries(obj).forEach(([k, v]) => {
        const origKey = k.replace(/\|/g, "/");
        out[origKey] = decodeKeys(v);
      });
      return out;
    }

    function useFirebase(path, defaultVal) {
      const [val, setVal] = useState(defaultVal);
      const valRef = useRef(defaultVal);
      const fbRef = useRef(db.ref(path));

      // Load from Firebase once on mount
      useEffect(() => {
        fbRef.current.once("value").then(snap => {
          const data = snap.val();
          if (data !== null) {
            const decoded = decodeKeys(data);
            let parsed;
            if (defaultVal instanceof Set) {
              parsed = new Set(decoded);
            } else if (defaultVal && typeof defaultVal === "object" && !Array.isArray(defaultVal)
                       && decoded && typeof decoded === "object" && !Array.isArray(decoded)) {
              // Merge: start with defaultVal, override with Firebase data
              parsed = { ...defaultVal, ...decoded };
            } else {
              parsed = decoded;
            }
            valRef.current = parsed;
            setVal(parsed);
          }
        }).catch(e => console.warn("Firebase load error:", path, e));
      }, []);

      function setFirebase(updater) {
        const prev = valRef.current;
        const newVal = typeof updater === "function" ? updater(prev) : updater;
        valRef.current = newVal;
        setVal(newVal);
        // Encode keys before saving (replace / with |)
        const toSave = newVal instanceof Set ? [...newVal] : encodeKeys(newVal);
        fbRef.current.set(toSave)
          .then(() => console.log("✅ Firebase saved:", path))
          .catch(e => {
            console.error("❌ Firebase save error:", path, e);
            alert("Firebase 寫入失敗: " + e.message);
          });
      }

      return [val, setFirebase];
    }

// Parse quantity multiplier from name: "*3" → 3, "90g*2" → 2, "2kg*3" → 3
function parseMultiplier(name) {
  // Match trailing *N or ×N
  const m = name.match(/[*×](\d+)\s*$/);
  return m ? parseInt(m[1]) : 1;
}

// Parse gram/weight total from Butch-style names e.g. "800g*4" → 3200, "2kg*3" → 6000
function parseGrams(name) {
  const kg = name.match(/(\d+(?:\.\d+)?)kg\s*[*×]\s*(\d+)/);
  if (kg) return parseFloat(kg[1]) * 1000 * parseInt(kg[2]);
  const gm = name.match(/(\d+)g\s*[*×]\s*(\d+)/);
  if (gm) return parseInt(gm[1]) * parseInt(gm[2]);
  const kgOnly = name.match(/(\d+(?:\.\d+)?)kg/);
  if (kgOnly) return parseFloat(kgOnly[1]) * 1000;
  const gOnly = name.match(/(\d+)g/);
  if (gOnly) return parseInt(gOnly[1]);
  return null;
}

function getTrackInfo(name) {
  for (const rule of TRACK_MAP) {
    if (rule.match.test(name)) {
      let divisor = rule.divisor;

      if (divisor === "auto") {
        // General: parse *N multiplier from name
        divisor = parseMultiplier(name);
      } else if (divisor === "auto_bag_multi") {
        const m = name.match(/(\d+)枚\s*[*×]\s*(\d+)/);
        divisor = m ? Math.round(parseInt(m[1]) * parseInt(m[2]) / 100) : 1;
      } else if (divisor === "auto_bag") {
        const m = name.match(/(\d+)枚/);
        divisor = m ? Math.round(parseInt(m[1]) / 100) : 1;
      } else if (divisor === "auto_per100g") {
        // Butch etc: total grams / 100
        const grams = parseGrams(name);
        divisor = grams ? Math.round(grams / 100) : 1;
      }

      return { ...rule, divisor: Math.max(1, divisor) };
    }
  }
  return null;
}

  const [newEntry, setNewEntry] = useState({ month: "", name: "", amount: "", qty: "1", trackPrice: false, isHotel: false, nights: "", trackTarget: "" });
  const [userPriceHistory, setUserPriceHistory] = useState({});
  const [editingItem, setEditingItem] = useState(null); // { index } for month detail
  const [editingItemVal, setEditingItemVal] = useState({ name: '', amount: '' });
  const [editingPriceItem, setEditingPriceItem] = useState(null); // { item, index }
  const [editingPriceVal, setEditingPriceVal] = useState("");
  const [addingManualPrice, setAddingManualPrice] = useState(false);
  const [manualPrice, setManualPrice] = useState({ name: "", month: "", price: "", qty: "1" });
  const [data, setData] = useState(ALL_DATA);
  const fbNewItems = useRef(db.ref("newItems"));
  const fbPriceEntries = useRef(db.ref("priceEntries"));

  // Load persisted new items from Firebase on mount
  useEffect(() => {
    fbNewItems.current.once("value").then(snap => {
      const saved = snap.val();
      if (!saved) return;
      // saved is array of {month, name, amount}
      const items = Array.isArray(saved) ? saved : Object.values(saved);
      setData(prev => {
        let next = { ...prev };
        items.forEach(({ month, name, amount }) => {
          if (!month || !name || !amount) return;
          const existing = next[month];
          if (existing) {
            next[month] = { ...existing, items: [...existing.items, { name, amount }], total: existing.total + amount };
          } else {
            next[month] = { month, icon: "📝", items: [{ name, amount }], total: amount };
          }
        });
        return next;
      });
    }).catch(e => console.warn("Load newItems error:", e));

    // Load price tracking entries
    fbPriceEntries.current.once("value").then(snap => {
      const saved = snap.val();
      if (!saved) return;
      const entries = Object.entries(saved || {});
      setUserPriceHistory(prev => {
        const next = { ...prev };
        entries.forEach(([id, entry]) => {
          const { trackKey, month, price, divisor, sourceMonth, sourceItemIndex, sourceItemName } = entry || {};
          if (!trackKey || !month) return;
          next[trackKey] = [...(next[trackKey] || []), { id, month, price, divisor, sourceMonth, sourceItemIndex, sourceItemName }];
        });
        return next;
      });
      setVisibleItems(prev => {
        const next = new Set([...prev]);
        entries.forEach(([_, entry]) => {
          if (entry?.trackKey) next.add(entry.trackKey);
        });
        return next;
      });
    }).catch(e => console.warn("Load priceEntries error:", e));
  }, []);

  function handleAvatarChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setAvatarSrc(ev.target.result);
    reader.readAsDataURL(file);
  }

  const months = MONTH_ORDER.filter(m => data[m]);
  const regularMonths = months.filter(m => !data[m].isSetup);

  const grandTotal = useMemo(() => months.reduce((s, m) => s + data[m].total, 0), [data, months]);
  const regularTotal = useMemo(() => regularMonths.reduce((s, m) => s + data[m].total, 0), [data, regularMonths]);

  const chartData = useMemo(() =>
    regularMonths.map(m => ({ month: m, total: data[m].total })),
    [data, regularMonths]
  );

  const priceItems = Object.keys(PRICE_HISTORY);
  const [userCategories, setUserCategories] = useState(PRICE_CATEGORIES);
  const [visibleItems, setVisibleItems] = useState(new Set(Object.keys(PRICE_HISTORY)));
  const [editingCats, setEditingCats] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [addingItemToCat, setAddingItemToCat] = useState(null); // category name
  const [newItemForCat, setNewItemForCat] = useState("");

  function toggleItem(item) {
    setVisibleItems(prev => {
      const next = new Set(prev);
      if (next.has(item)) next.delete(item); else next.add(item);
      return next;
    });
  }

  function addCategory() {
    const name = newCatName.trim();
    if (!name || userCategories[name]) return;
    setUserCategories(prev => ({ ...prev, [name]: [] }));
    setNewCatName("");
  }

  function deleteCategory(cat) {
    setUserCategories(prev => {
      const next = { ...prev };
      delete next[cat];
      return next;
    });
    if (priceCategory === cat) setPriceCategory("全部");
  }

  function addItemToCategory(cat, itemName) {
    const name = itemName.trim();
    if (!name || !PRICE_HISTORY[name]) return;
    setUserCategories(prev => ({
      ...prev,
      [cat]: prev[cat].includes(name) ? prev[cat] : [...prev[cat], name],
    }));
    setAddingItemToCat(null);
    setNewItemForCat("");
  }

  function removeItemFromCategory(cat, item) {
    setUserCategories(prev => ({
      ...prev,
      [cat]: prev[cat].filter(i => i !== item),
    }));
  }

  // All entries are editable - builtin ones get overrides stored in userPriceOverrides
  // We store overrides as { [item]: { [index]: { price?, deleted? } } }
  const [priceOverrides, setPriceOverrides] = useState({});

  function isUserEntry(item, index) {
    return true; // all entries now editable
  }

  function deleteUserPriceEntry(item, index) {
    const builtinCount = (PRICE_HISTORY[item] || []).length;
    if (index < builtinCount) {
      // Mark builtin entry as deleted via override
      setPriceOverrides(prev => ({
        ...prev,
        [item]: { ...(prev[item] || {}), [index]: { deleted: true } },
      }));
    } else {
      // Remove from userPriceHistory
      const userIdx = index - builtinCount;
      setUserPriceHistory(prev => ({
        ...prev,
        [item]: (prev[item] || []).filter((_, i) => i !== userIdx),
      }));
    }
  }

  function updateUserPriceEntry(item, index, newPrice) {
    const val = parseInt(newPrice);
    if (isNaN(val)) return;
    const builtinCount = (PRICE_HISTORY[item] || []).length;
    if (index < builtinCount) {
      // Override builtin entry - no monthly data to sync (builtin has no source link)
      setPriceOverrides(prev => ({
        ...prev,
        [item]: { ...(prev[item] || {}), [index]: { price: val } },
      }));
    } else {
      const userIdx = index - builtinCount;
      // Get the entry to find source link
      const entry = (userPriceHistory[item] || [])[userIdx];
      setUserPriceHistory(prev => ({
        ...prev,
        [item]: (prev[item] || []).map((e, i) => i === userIdx ? { ...e, price: val } : e),
      }));
      // Sync back to monthly data if this entry has a source link
      if (entry?.sourceMonth && entry?.sourceItemIndex !== undefined) {
        const divisor = entry.divisor || 1;
        const newTotal = val * divisor;
        setData(prev => {
          const month = prev[entry.sourceMonth];
          if (!month) return prev;
          const oldAmt = month.items[entry.sourceItemIndex]?.amount ?? 0;
          const newItems = month.items.map((it, i) =>
            i === entry.sourceItemIndex ? { ...it, amount: newTotal } : it
          );
          return { ...prev, [entry.sourceMonth]: { ...month, items: newItems, total: month.total - oldAmt + newTotal } };
        });
      }
    }
    setEditingPriceItem(null);
    setEditingPriceVal("");
  }

  function editMonthItem(index, newName, newAmount) {
    const amt = parseInt(newAmount);
    if (!newName || isNaN(amt)) return;
    // Update monthly data
    setData(prev => {
      const month = prev[selectedMonth];
      const oldAmt = month.items[index].amount;
      const newItems = month.items.map((it, i) => i === index ? { name: newName, amount: amt } : it);
      return { ...prev, [selectedMonth]: { ...month, items: newItems, total: month.total - oldAmt + amt } };
    });
    // Sync to price tracking: find any userPriceHistory entry linked to this item
    setUserPriceHistory(prev => {
      const updated = { ...prev };
      Object.entries(updated).forEach(([key, entries]) => {
        updated[key] = entries.map(e => {
          if (e.sourceMonth === selectedMonth && e.sourceItemIndex === index) {
            const divisor = e.divisor || 1;
            return { ...e, price: Math.round(amt / divisor), sourceItemName: newName };
          }
          return e;
        });
      });
      return updated;
    });
    setEditingItem(null);
  }

  function deleteMonthItem(index) {
    setData(prev => {
      const month = prev[selectedMonth];
      const item = month.items[index];
      const oldAmt = item.amount;
      // Also remove matching entry from userPriceHistory
      const autoInfo = getTrackInfo(item.name);
      setUserPriceHistory(ph => {
        const key = autoInfo ? autoInfo.trackKey : item.name;
        if (!ph[key]) return ph;
        // Remove the entry matching this month
        const updated = ph[key].filter(e => e.month !== selectedMonth);
        return { ...ph, [key]: updated };
      });
      const newItems = month.items.filter((_, i) => i !== index);
      return { ...prev, [selectedMonth]: { ...month, items: newItems, total: month.total - oldAmt } };
    });
  }

  function addManualPriceEntry() {
    const name = manualPrice.name.trim();
    const month = manualPrice.month.trim();
    const total = parseInt(manualPrice.price);
    const qty = Math.max(1, parseInt(manualPrice.qty) || 1);
    if (!name || !month || isNaN(total)) return;
    const unitPrice = Math.round(total / qty);
    const priceEntry = { trackKey: name, month, price: unitPrice };
    setUserPriceHistory(prev => ({
      ...prev,
      [name]: [...(prev[name] || []), priceEntry],
    }));
    setVisibleItems(prev => new Set([...prev, name]));
    const newRef = fbPriceEntries.current.push();
    newRef.set(priceEntry).catch(e => console.warn("Save price entry error:", e));
    setManualPrice({ name: "", month: "", price: "", qty: "1" });
    setAddingManualPrice(false);
  }

  // Add item from monthly detail into price tracking
  function addMonthItemToTracking(itemName, amount, month, itemIndex) {
    const autoInfo = getTrackInfo(itemName);
    const key = autoInfo ? autoInfo.trackKey : itemName;
    const divisor = autoInfo ? autoInfo.divisor : 1;
    const unitPrice = Math.round(amount / divisor);
    const priceEntry = { trackKey: key, month, price: unitPrice, divisor, sourceMonth: month, sourceItemIndex: itemIndex, sourceItemName: itemName };
    setUserPriceHistory(prev => ({
      ...prev,
      [key]: [...(prev[key] || []), priceEntry],
    }));
    setVisibleItems(prev => new Set([...prev, key]));
    const newRef = fbPriceEntries.current.push();
    newRef.set(priceEntry).catch(e => console.warn("Save price entry error:", e));
  }

  function handleAddEntry() {
    if (!newEntry.month || !newEntry.name || !newEntry.amount) return;
    const amount = parseInt(newEntry.amount);
    if (isNaN(amount)) return;
    const qty = Math.max(1, parseInt(newEntry.qty) || 1);
    const nights = Math.max(1, parseInt(newEntry.nights) || 1);
    // Add to monthly data (local state)
    setData(prev => {
      const existing = prev[newEntry.month];
      if (existing) {
        return { ...prev, [newEntry.month]: { ...existing, items: [...existing.items, { name: newEntry.name, amount }], total: existing.total + amount } };
      } else {
        return { ...prev, [newEntry.month]: { month: newEntry.month, icon: "📝", items: [{ name: newEntry.name, amount }], total: amount } };
      }
    });
    // Save to Firebase (append to newItems list)
    fbNewItems.current.push({ month: newEntry.month, name: newEntry.name, amount })
      .then(() => console.log("✅ Saved to Firebase"))
      .catch(e => { console.error("❌ Firebase error:", e); alert("保存失敗: " + e.message); });
    // Hotel mode: always track as 住宿費(每晚均價)
    if (newEntry.isHotel) {
      const perNight = Math.round(amount / nights);
      const label = `${newEntry.month}(${nights}晚)`;
      setUserPriceHistory(prev => ({
        ...prev,
        "住宿費(每晚均價)": [...(prev["住宿費(每晚均價)"] || []), { month: label, price: perNight }],
      }));
      setVisibleItems(prev => new Set([...prev, "住宿費(每晚均價)"]));
    } else if (newEntry.trackPrice) {
      const autoInfo = getTrackInfo(newEntry.name);
      // Priority: 1) manual dropdown selection, 2) TRACK_MAP auto, 3) item name as new key
      const key = newEntry.trackTarget || (autoInfo ? autoInfo.trackKey : newEntry.name);
      const divisor = newEntry.trackTarget ? qty : (autoInfo ? autoInfo.divisor : qty);
      const unitPrice = Math.round(amount / divisor);
      // Get item index in that month for back-reference
      const monthItems = (data[newEntry.month]?.items || []);
      const itemIndex = monthItems.length; // newly added item will be at this index
      const priceEntry = { trackKey: key, month: newEntry.month, price: unitPrice, divisor, sourceMonth: newEntry.month, sourceItemIndex: itemIndex, sourceItemName: newEntry.name };
      setUserPriceHistory(prev => ({
        ...prev,
        [key]: [...(prev[key] || []), priceEntry],
      }));
      setVisibleItems(prev => new Set([...prev, key]));
      const newRef = fbPriceEntries.current.push();
    newRef.set(priceEntry).catch(e => console.warn("Save price entry error:", e));
    }
    const savedMonth = newEntry.month;
    setNewEntry({ month: savedMonth, name: "", amount: "", qty: "1", trackPrice: false, isHotel: false, nights: "", trackTarget: "" });
    setSelectedMonth(savedMonth);
    setView("month");

  const mergedPriceHistory = {};

    mergedPriceHistory[k] = filtered;

      const mb = (b.month.match(/([0-9]{4}[/][0-9]{2})/) || ["","0000/00"])[1];
      return ma < mb ? -1 : ma > mb ? 1 : 0;
    });
  });

            {selectedItem && selectedPriceHistory && (

                            <input autoFocus value={editingPriceVal} onChange={e => setEditingPriceVal(e.target.value)}
                              type="number"
                              style={{ flex: 1, background: COLORS.bg, border: `1px solid ${COLORS.accent}`, borderRadius: 6, padding: "4px 8px", color: COLORS.text, fontSize: 13, outline: "none" }} />
                            <button onClick={() => updateUserPriceEntry(selectedItem, i, editingPriceVal)}
                              style={{ background: COLORS.accent, border: "none", borderRadius: 6, padding: "4px 10px", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✓</button>
                            <button onClick={() => setEditingPriceItem(null)}
                              style={{ background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 6, padding: "4px 8px", color: COLORS.muted, fontSize: 12, cursor: "pointer" }}>✕</button>
                          </div>
                        ) : (
                          <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, justifyContent: "flex-end" }}>
                            {diff !== 0 && (
                              <span style={{ fontSize: 11, color: diff > 0 ? COLORS.red : COLORS.green, fontWeight: 600 }}>
                                {diff > 0 ? "▲" : "▼"}{fmt(Math.abs(diff))}
                              </span>
                            )}
                            <span style={{ fontWeight: 700, color: COLORS.accent }}>{fmt(h.price)}</span>
                            {editable && (
                              <>
                                <button onClick={() => { setEditingPriceItem({ item: selectedItem, index: i }); setEditingPriceVal(String(h.price)); }}
                                  style={{ background: "none", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: 13, padding: "0 2px" }}>✎</button>
                                <button onClick={() => deleteUserPriceEntry(selectedItem, i)}
                                  style={{ background: "none", border: "none", color: COLORS.red, cursor: "pointer", fontSize: 13, padding: "0 2px" }}>✕</button>
                              </>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 10, padding: "10px", background: "rgba(232,132,122,0.08)", borderRadius: 10, fontSize: 12 }}>
                    <span style={{ color: COLORS.muted }}>最高: </span>
                    <span style={{ color: COLORS.red, fontWeight: 700 }}>{fmt(Math.max(...selectedPriceHistory.map(h => h.price)))}</span>
                    <span style={{ margin: "0 12px", color: COLORS.muted }}>最低: </span>
                    <span style={{ color: COLORS.green, fontWeight: 700 }}>{fmt(Math.min(...selectedPriceHistory.map(h => h.price)))}</span>
                  </div>
                </div>
              </div>
            )}

            {!selectedItem && (
              <div style={{ background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 14, padding: 24, textAlign: "center", color: COLORS.muted }}>
                請選擇上方商品查看價格變化 📈
              </div>
            )}
          </div>
        )}

        {/* ADD */}
        {view === "add" && (
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 16 }}>新增支出記錄</div>
            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 16, padding: 18, display: "flex", flexDirection: "column", gap: 14, boxShadow: "0 2px 10px rgba(232,132,122,0.08)" }}>
              <div>
                <div style={{ color: COLORS.muted, fontSize: 12, marginBottom: 6 }}>月份</div>
                <input value={newEntry.month} onChange={e => setNewEntry(p => ({...p, month: e.target.value}))}
                  placeholder="e.g. 2026/06"
                  style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
              </div>
              <div>
                <div style={{ color: COLORS.muted, fontSize: 12, marginBottom: 6 }}>商品/項目名稱</div>
                <input value={newEntry.name} onChange={e => setNewEntry(p => ({...p, name: e.target.value}))}
                  placeholder="e.g. 乳酸菌90g*2"
                  style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
              </div>
              {/* Hotel mode toggle */}
              <div onClick={() => setNewEntry(p => ({ ...p, isHotel: !p.isHotel, trackPrice: false }))}
                style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "10px 12px", background: newEntry.isHotel ? "rgba(91,156,246,0.08)" : COLORS.bg, border: `1px solid ${newEntry.isHotel ? COLORS.blue : COLORS.cardBorder}`, borderRadius: 10, transition: "all .15s" }}>
                <div style={{ width: 20, height: 20, borderRadius: 6, background: newEntry.isHotel ? COLORS.blue : "transparent", border: `2px solid ${newEntry.isHotel ? COLORS.blue : COLORS.muted}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
                  {newEntry.isHotel && <span style={{ color: "white", fontSize: 12, fontWeight: 900 }}>✓</span>}
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>住宿記錄 🏨</div>
                  <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 2 }}>自動換算每晚均價加入追蹤</div>
                </div>
              </div>

              {/* Amount + qty/nights row */}
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 2 }}>
                  <div style={{ color: COLORS.muted, fontSize: 12, marginBottom: 6 }}>總金額 (¥)</div>
                  <input value={newEntry.amount} onChange={e => setNewEntry(p => ({...p, amount: e.target.value}))}
                    type="number" placeholder="e.g. 20500"
                    style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                {newEntry.isHotel ? (
                  <div style={{ flex: 1 }}>
                    <div style={{ color: COLORS.muted, fontSize: 12, marginBottom: 6 }}>天數</div>
                    <input value={newEntry.nights} onChange={e => setNewEntry(p => ({...p, nights: e.target.value}))}
                      type="number" min="1" placeholder="3"
                      style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.blue}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  </div>
                ) : (
                  <div style={{ flex: 1 }}>
                    <div style={{ color: COLORS.muted, fontSize: 12, marginBottom: 6 }}>數量</div>
                    <input value={newEntry.qty} onChange={e => setNewEntry(p => ({...p, qty: e.target.value}))}
                      type="number" min="1" placeholder="1"
                      style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  </div>
                )}
              </div>

              {/* Preview */}
              {newEntry.amount && newEntry.isHotel && newEntry.nights && (
                <div style={{ fontSize: 12, color: COLORS.blue, background: "rgba(91,156,246,0.08)", borderRadius: 8, padding: "8px 12px" }}>
                  每晚均價：{fmt(Math.round(parseInt(newEntry.amount) / Math.max(1, parseInt(newEntry.nights))))} → 自動加入「住宿費(每晚均價)」追蹤
                </div>
              )}
              {newEntry.amount && !newEntry.isHotel && parseInt(newEntry.qty) > 1 && (
                <div style={{ fontSize: 12, color: COLORS.muted, background: COLORS.accentSoft, borderRadius: 8, padding: "8px 12px" }}>
                  單價：{fmt(Math.round(parseInt(newEntry.amount) / parseInt(newEntry.qty)))}
                </div>
              )}

              {/* Price tracking toggle (non-hotel only) */}
              {!newEntry.isHotel && (
                <div style={{ border: `1px solid ${newEntry.trackPrice ? COLORS.accent : COLORS.cardBorder}`, borderRadius: 10, overflow: "hidden", transition: "all .15s" }}>
                  <div onClick={() => setNewEntry(p => ({...p, trackPrice: !p.trackPrice, trackTarget: ""}))}
                    style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "10px 12px", background: newEntry.trackPrice ? "rgba(232,132,122,0.08)" : COLORS.bg }}>
                    <div style={{ width: 20, height: 20, borderRadius: 6, background: newEntry.trackPrice ? COLORS.accent : "transparent", border: `2px solid ${newEntry.trackPrice ? COLORS.accent : COLORS.muted}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
                      {newEntry.trackPrice && <span style={{ color: "white", fontSize: 12, fontWeight: 900 }}>✓</span>}
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>加入價格追蹤 📈</div>
                      <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 2 }}>會以單價記錄在價格追蹤頁</div>
                    </div>
                  </div>
                  {newEntry.trackPrice && (
                    <div style={{ padding: "0 12px 12px", background: "rgba(232,132,122,0.04)" }}>
                      <div style={{ fontSize: 11, color: COLORS.muted, marginBottom: 6 }}>加入哪個追蹤項目？</div>
                      {(() => { const auto = getTrackInfo(newEntry.name); return (
                        <div style={{ fontSize: 11, color: COLORS.accent, marginBottom: 6 }}>
                          {auto ? `自動對應 → 「${auto.trackKey}」` : "找不到對應項目，將新建追蹤"}
                        </div>
                      ); })()}
                      <select value={newEntry.trackTarget} onChange={e => setNewEntry(p => ({...p, trackTarget: e.target.value}))}
                        style={{ width: "100%", background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "8px 10px", color: COLORS.text, fontSize: 13, outline: "none" }}>
                        <option value="">{(() => { const auto = getTrackInfo(newEntry.name); return auto ? `自動：${auto.trackKey}` : `新建：${newEntry.name || "（請先填商品名）"}`; })()}</option>
                        {Object.keys(mergedPriceHistory).map(k => (
                          <option key={k} value={k}>{k}</option>
                        ))}
                      </select>
                    </div>
                  )}
                </div>
              )}
              <button onClick={handleAddEntry}
                style={{ background: "linear-gradient(135deg,#e8847a,#f0a896)", border: "none", borderRadius: 10, padding: "12px", color: "white", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
                ＋ 新增記錄
              </button>
            </div>

            <div style={{ marginTop: 20, background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 14, padding: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12, color: COLORS.muted }}>快速選擇月份</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {months.map(m => (
                  <button key={m} onClick={() => setNewEntry(p => ({...p, month: m}))}
                    style={{ background: newEntry.month === m ? COLORS.accentSoft : COLORS.bg, border: `1px solid ${newEntry.month === m ? COLORS.accent : COLORS.cardBorder}`, borderRadius: 20, padding: "5px 12px", color: newEntry.month === m ? COLORS.accent : COLORS.muted, cursor: "pointer", fontSize: 12 }}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>

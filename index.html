  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

    // Firebase sync hook
    // Firebase keys can't contain . # $ [ ] /
    // So we encode/decode keys with / -> |
    function encodeKeys(obj) {
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
      const out = {};
      Object.entries(obj).forEach(([k, v]) => {
        const safeKey = k.replace(/\//g, "|");
        out[safeKey] = encodeKeys(v);
      });
      return out;
    }
    function decodeKeys(obj) {
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
      const out = {};
      Object.entries(obj).forEach(([k, v]) => {
        const origKey = k.replace(/\|/g, "/");
        out[origKey] = decodeKeys(v);
      });
      return out;
    }

    function useFirebase(path, defaultVal) {
      const [val, setVal] = useState(defaultVal);
      const valRef = useRef(defaultVal);
      const fbRef = useRef(db.ref(path));

      // Load from Firebase once on mount
      useEffect(() => {
        fbRef.current.once("value").then(snap => {
          const data = snap.val();
          if (data !== null) {
            const decoded = decodeKeys(data);
            let parsed;
            if (defaultVal instanceof Set) {
              parsed = new Set(decoded);
            } else if (defaultVal && typeof defaultVal === "object" && !Array.isArray(defaultVal)
                       && decoded && typeof decoded === "object" && !Array.isArray(decoded)) {
              // Merge: start with defaultVal, override with Firebase data
              parsed = { ...defaultVal, ...decoded };
            } else {
              parsed = decoded;
            }
            valRef.current = parsed;
            setVal(parsed);
          }
        }).catch(e => console.warn("Firebase load error:", path, e));
      }, []);

      function setFirebase(updater) {
        const prev = valRef.current;
        const newVal = typeof updater === "function" ? updater(prev) : updater;
        valRef.current = newVal;
        setVal(newVal);
        // Encode keys before saving (replace / with |)
        const toSave = newVal instanceof Set ? [...newVal] : encodeKeys(newVal);
        fbRef.current.set(toSave)
          .then(() => console.log("✅ Firebase saved:", path))
          .catch(e => {
            console.error("❌ Firebase save error:", path, e);
            alert("Firebase 寫入失敗: " + e.message);
          });
      }

      return [val, setFirebase];
    }

// Parse quantity multiplier from name: "*3" → 3, "90g*2" → 2, "2kg*3" → 3
function parseMultiplier(name) {
  // Match trailing *N or ×N
  const m = name.match(/[*×](\d+)\s*$/);
  return m ? parseInt(m[1]) : 1;
}

// Parse gram/weight total from Butch-style names e.g. "800g*4" → 3200, "2kg*3" → 6000
function parseGrams(name) {
  const kg = name.match(/(\d+(?:\.\d+)?)kg\s*[*×]\s*(\d+)/);
  if (kg) return parseFloat(kg[1]) * 1000 * parseInt(kg[2]);
  const gm = name.match(/(\d+)g\s*[*×]\s*(\d+)/);
  if (gm) return parseInt(gm[1]) * parseInt(gm[2]);
  const kgOnly = name.match(/(\d+(?:\.\d+)?)kg/);
  if (kgOnly) return parseFloat(kgOnly[1]) * 1000;
  const gOnly = name.match(/(\d+)g/);
  if (gOnly) return parseInt(gOnly[1]);
  return null;
}

function getTrackInfo(name) {
  for (const rule of TRACK_MAP) {
    if (rule.match.test(name)) {
      let divisor = rule.divisor;

      if (divisor === "auto") {
        // General: parse *N multiplier from name
        divisor = parseMultiplier(name);
      } else if (divisor === "auto_bag_multi") {
        const m = name.match(/(\d+)枚\s*[*×]\s*(\d+)/);
        divisor = m ? Math.round(parseInt(m[1]) * parseInt(m[2]) / 100) : 1;
      } else if (divisor === "auto_bag") {
        const m = name.match(/(\d+)枚/);
        divisor = m ? Math.round(parseInt(m[1]) / 100) : 1;
      } else if (divisor === "auto_per100g") {
        // Butch etc: total grams / 100
        const grams = parseGrams(name);
        divisor = grams ? Math.round(grams / 100) : 1;
      }

      return { ...rule, divisor: Math.max(1, divisor) };
    }
  }
  return null;
}

                    <input value={newEntry.qty} onChange={e => setNewEntry(p => ({...p, qty: e.target.value}))}
                      type="number" min="1" placeholder="1"
                      style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "10px 12px", color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  </div>
                )}
              </div>

              {/* Preview */}
              {newEntry.amount && newEntry.isHotel && newEntry.nights && (
                <div style={{ fontSize: 12, color: COLORS.blue, background: "rgba(91,156,246,0.08)", borderRadius: 8, padding: "8px 12px" }}>
                  每晚均價：{fmt(Math.round(parseInt(newEntry.amount) / Math.max(1, parseInt(newEntry.nights))))} → 自動加入「住宿費(每晚均價)」追蹤
                </div>
              )}
              {newEntry.amount && !newEntry.isHotel && parseInt(newEntry.qty) > 1 && (
                <div style={{ fontSize: 12, color: COLORS.muted, background: COLORS.accentSoft, borderRadius: 8, padding: "8px 12px" }}>
                  單價：{fmt(Math.round(parseInt(newEntry.amount) / parseInt(newEntry.qty)))}
                </div>
              )}

              {/* Price tracking toggle (non-hotel only) */}
              {!newEntry.isHotel && (
                <div style={{ border: `1px solid ${newEntry.trackPrice ? COLORS.accent : COLORS.cardBorder}`, borderRadius: 10, overflow: "hidden", transition: "all .15s" }}>
                  <div onClick={() => setNewEntry(p => ({...p, trackPrice: !p.trackPrice, trackTarget: ""}))}
                    style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "10px 12px", background: newEntry.trackPrice ? "rgba(232,132,122,0.08)" : COLORS.bg }}>
                    <div style={{ width: 20, height: 20, borderRadius: 6, background: newEntry.trackPrice ? COLORS.accent : "transparent", border: `2px solid ${newEntry.trackPrice ? COLORS.accent : COLORS.muted}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
                      {newEntry.trackPrice && <span style={{ color: "white", fontSize: 12, fontWeight: 900 }}>✓</span>}
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>加入價格追蹤 📈</div>
                      <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 2 }}>會以單價記錄在價格追蹤頁</div>
                    </div>
                  </div>
                  {newEntry.trackPrice && (
                    <div style={{ padding: "0 12px 12px", background: "rgba(232,132,122,0.04)" }}>
                      <div style={{ fontSize: 11, color: COLORS.muted, marginBottom: 6 }}>加入哪個追蹤項目？</div>
                      {(() => { const auto = getTrackInfo(newEntry.name); return (
                        <div style={{ fontSize: 11, color: COLORS.accent, marginBottom: 6 }}>
                          {auto ? `自動對應 → 「${auto.trackKey}」` : "找不到對應項目，將新建追蹤"}
                        </div>
                      ); })()}
                      <select value={newEntry.trackTarget} onChange={e => setNewEntry(p => ({...p, trackTarget: e.target.value}))}
                        style={{ width: "100%", background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 8, padding: "8px 10px", color: COLORS.text, fontSize: 13, outline: "none" }}>
                        <option value="">{(() => { const auto = getTrackInfo(newEntry.name); return auto ? `自動：${auto.trackKey}` : `新建：${newEntry.name || "（請先填商品名）"}`; })()}</option>
                        {Object.keys(mergedPriceHistory).map(k => (
                          <option key={k} value={k}>{k}</option>
                        ))}
                      </select>
                    </div>
                  )}
                </div>
              )}
              <button onClick={handleAddEntry}
                style={{ background: "linear-gradient(135deg,#e8847a,#f0a896)", border: "none", borderRadius: 10, padding: "12px", color: "white", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
                ＋ 新增記錄
              </button>
            </div>

            <div style={{ marginTop: 20, background: COLORS.card, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 14, padding: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12, color: COLORS.muted }}>快速選擇月份</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {months.map(m => (
                  <button key={m} onClick={() => setNewEntry(p => ({...p, month: m}))}
                    style={{ background: newEntry.month === m ? COLORS.accentSoft : COLORS.bg, border: `1px solid ${newEntry.month === m ? COLORS.accent : COLORS.cardBorder}`, borderRadius: 20, padding: "5px 12px", color: newEntry.month === m ? COLORS.accent : COLORS.muted, cursor: "pointer", fontSize: 12 }}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
